[tool.black]
line-length = 120
target-version = ['py310', 'py311', 'py312']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs/
  | \.git/
  | \.hg/
  | \.mypy_cache/
  | \.nox/
  | \.tox/
  | \.venv/
  | _build/
  | buck-out/
  | build/
  | dist/
  | models/
  | data/
)/
'''

[tool.pytest.ini_options]
testpaths = ["test"]
pythonpath = ["."]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --cov=src --cov-report=html --cov-report=term --cov-fail-under=10"

[tool.coverage.run]
source = ["src"]
omit = [
    "src/__init__.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 90
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.:",
]
