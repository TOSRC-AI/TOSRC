global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'llm-router-monitor'

scrape_configs:
  - job_name: 'llm-router'
    scrape_interval: 5s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['llm-router:8765']
        labels:
          service: 'llm-router'
          environment: 'prod'

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
