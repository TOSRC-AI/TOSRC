<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量测试与准确率统计</title>
    <script src="/static/libs/tailwindcss.min.js"></script>
    <link rel="stylesheet" href="/static/libs/font-awesome/all.min.css">
    <script src="/static/libs/chart.min.js"></script>
    <script src="/static/libs/papaparse.min.js"></script>
    <style>
        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航 -->
    <nav class="bg-white shadow-md mb-6">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-flask-vial text-blue-600 text-2xl"></i>
                    <span class="font-bold text-xl text-gray-800">批量测试与准确率统计</span>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/batch_api_test" class="text-blue-600 hover:text-blue-800 transition font-medium">
                        <i class="fas fa-bolt mr-1"></i>批量API测试
                    </a>
                    <a href="/" class="px-4 py-2 bg-gray-600 text-white rounded-md hover:bg-gray-700 transition">
                        <i class="fas fa-arrow-left mr-1"></i>返回首页
                    </a>
                    <select id="envSelector" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="dev">开发环境</option>
                        <option value="test">测试环境</option>
                        <option value="prod">生产环境</option>
                    </select>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 pb-12">
        <!-- 顶部操作区 -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold text-gray-800 flex items-center">
                    <i class="fas fa-flask-vial text-blue-600 mr-2"></i>
                    批量测试
                </h2>
            </div>

            <!-- 拖拽上传区域 -->
            <div id="dropArea" class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center cursor-pointer mb-4 hover:border-blue-500 hover:bg-blue-50 transition" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-file-csv text-5xl text-gray-400 mb-3"></i>
                <p class="text-gray-600 mb-1 text-lg">点击上传CSV测试用例，或拖拽到此处</p>
                <p class="text-xs text-gray-500 mb-4">支持批量测试用例CSV导入</p>
                <input type="file" id="fileInput" accept=".csv" class="hidden">
                <div class="flex justify-center space-x-3">
                    <button onclick="event.stopPropagation(); downloadTemplate();" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200 transition flex items-center text-sm">
                        <i class="fas fa-download mr-1"></i>下载测试模板
                    </button>
                </div>
            </div>
            
            <!-- 用例信息 -->
            <div id="caseInfo" class="p-4 bg-gray-50 rounded-md mb-4 hidden">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-700" id="caseCountText">已加载 <span class="font-semibold text-blue-600" id="caseCount">0</span> 条测试用例</p>
                        <p class="text-xs text-gray-500 mt-1" id="caseFileName"></p>
                    </div>
                    <div class="flex space-x-2">
                        <button id="runBatchTestBtn" class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition flex items-center">
                            <i class="fas fa-bolt mr-2"></i>开始批量测试
                        </button>
                    </div>
                </div>
            </div>

            <!-- 测试用例预览 -->
            <div id="previewSection" class="overflow-x-auto max-h-60 hidden">
                <table class="w-full border-collapse text-sm">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase border-b">序号</th>
                            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase border-b">输入文本</th>
                            <th class="px-3 py-2 text-left text-xs font-medium text-gray-500 uppercase border-b">预期意图</th>
                        </tr>
                    </thead>
                    <tbody id="previewTable" class="divide-y divide-gray-200">
                        <!-- 动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 第三步：测试进度 -->
        <div id="progressSection" class="bg-white rounded-lg shadow-md p-6 mb-6 hidden">
            <h2 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                <i class="fas fa-spinner fa-spin text-blue-600 mr-2"></i>
                步骤3：测试运行中
            </h2>
            <div class="mb-2 flex justify-between text-sm">
                <span class="text-gray-600">测试进度</span>
                <span id="progressText" class="font-medium">0%</span>
            </div>
            <div class="progress-bar mb-4">
                <div id="progressFill" class="progress-fill" style="width: 0%"></div>
            </div>
            <p id="statusText" class="text-sm text-gray-600">准备开始测试...</p>
        </div>

        <!-- 第四步：测试结果 -->
        <div id="resultSection" class="hidden">
            <!-- 统计卡片 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="bg-white rounded-lg shadow-md p-6">
                    <p class="text-sm text-gray-500 mb-1">总用例数</p>
                    <p id="totalCases" class="text-3xl font-bold text-gray-800">0</p>
                </div>
                <div class="bg-white rounded-lg shadow-md p-6">
                    <p class="text-sm text-gray-500 mb-1">意图识别准确率</p>
                    <p id="intentAccuracy" class="text-3xl font-bold text-green-600">0%</p>
                </div>
                <div class="bg-white rounded-lg shadow-md p-6">
                    <p class="text-sm text-gray-500 mb-1">平均响应时间</p>
                    <p id="avgResponseTime" class="text-3xl font-bold text-purple-600">0ms</p>
                </div>
            </div>

            <!-- 图表 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h3 class="text-md font-semibold text-gray-800 mb-4">准确率对比</h3>
                    <canvas id="accuracyChart" height="250"></canvas>
                </div>
                <div class="bg-white rounded-lg shadow-md p-6">
                    <h3 class="text-md font-semibold text-gray-800 mb-4">错误分布</h3>
                    <canvas id="errorChart" height="250"></canvas>
                </div>
            </div>

            <!-- 失败用例列表 -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-semibold text-gray-800 flex items-center">
                        <i class="fas fa-times-circle text-red-500 mr-2"></i>
                        失败用例详情
                    </h3>
                    <button onclick="exportFailedCases()" class="px-3 py-1 bg-red-600 text-white text-sm rounded hover:bg-red-700 transition">
                        <i class="fas fa-download mr-1"></i>导出失败用例
                    </button>
                </div>
                <div class="overflow-x-auto max-h-80">
                    <table class="w-full border-collapse">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase border-b">序号</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase border-b">输入文本</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase border-b">预期意图</th>
                                <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase border-b">错误意图</th>
                            </tr>
                        </thead>
                        <tbody id="failedCasesTable" class="divide-y divide-gray-200">
                            <!-- 动态生成 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="flex justify-end space-x-3">
                <button onclick="window.location.reload()" class="px-4 py-2 bg-gray-600 text-white rounded-md hover:bg-gray-700 transition">
                    <i class="fas fa-redo mr-1"></i>重新测试
                </button>
                <button onclick="exportFullReport()" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition">
                    <i class="fas fa-file-export mr-1"></i>导出完整报告
                </button>
            </div>
        </div>
    </div>

    <script>
        let testCases = [];
        let testResults = [];
        let currentEnv = 'dev';
        let accuracyChart = null;
        let errorChart = null;
        let intentMapping = {}; // 动态从后端获取的意图映射字典

        // 页面初始化：加载意图映射字典
        async function loadIntentMapping() {
            try {
                const res = await fetch('/api/v1/config/intent_dict', {
                    headers: {
                        'X-API-Key': 'admin-llm-router-2026'
                    }
                });
                const result = await res.json();
                if (result.code === 200 && result.data) {
                    intentMapping = result.data;
                    console.log('✅ 意图映射字典加载成功', intentMapping);
                }
            } catch (e) {
                console.warn('⚠️ 意图映射字典加载失败，使用默认映射', e);
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadIntentMapping();
        });

        // 环境切换
        document.getElementById('envSelector').addEventListener('change', function() {
            currentEnv = this.value;
        });

        // 文件上传
        document.getElementById('fileInput').addEventListener('change', function(e) {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        });

        // 页面加载时检查是否有导入的测试用例
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('imported') === '1') {
                const importedCases = localStorage.getItem('imported_test_cases');
                if (importedCases) {
                    try {
                        testCases = JSON.parse(importedCases);
                        document.getElementById('caseCount').textContent = testCases.length;
                        document.getElementById('caseFileName').textContent = '从配置管理页面导入';
                        document.getElementById('caseInfo').classList.remove('hidden');
                        renderPreview();
                        localStorage.removeItem('imported_test_cases');
                    } catch (e) {
                        console.error('导入测试用例失败:', e);
                    }
                }
            }

            // 注册批量测试按钮事件
            const batchTestBtn = document.getElementById('runBatchTestBtn');
            if (batchTestBtn) {
                batchTestBtn.addEventListener('click', runBatchTest);
            }
            
        });

        // 处理CSV文件
            function handleFile(file) {
                if (file.type !== 'text/csv' && !file.name.endsWith('.csv')) {
                    alert('请上传CSV格式的文件');
                    return;
                }
                
                Papa.parse(file, {
                    header: true,
                    encoding: 'UTF-8',
                    complete: function(results) {
                        testCases = results.data.filter(row => {
                            // 适配两列格式：text和intent
                            return (row.text && row.text.trim()) || (row.input_text && row.input_text.trim());
                        }).map(row => {
                            // 兼容新旧两种格式：新格式（text + intent）和旧格式（input_text + expected_intent）
                            const inputText = row.text || row.input_text || '';
                            let expectedIntent = '';
                            
                            // 使用从后端动态加载的意图映射字典，支持中英文自动匹配
                            
                            let rawExpectedIntent = ''; // 保存原始的意图文本，用于显示
                            if (row.intent) {
                                rawExpectedIntent = row.intent;
                                // 新格式：intent是数组 ["一级意图", "二级意图"]
                                try {
                                    const intentArr = JSON.parse(row.intent);
                                    if (Array.isArray(intentArr)) {
                                        // 完整保存原始数组用于显示和判断
                                        row.raw_expected_intent = intentArr;
                                        // 判断所有意图编码是否存在于数据库中
                                        row.intent_exists = intentArr.every(code => intentMapping.hasOwnProperty(code));
                                        // 匹配逻辑：用二级意图进行匹配
                                        expectedIntent = intentArr[1] || intentArr[0];
                                    } else {
                                        row.raw_expected_intent = [row.intent];
                                        row.intent_exists = intentMapping.hasOwnProperty(row.intent);
                                        expectedIntent = row.intent;
                                    }
                                } catch (e) {
                                    row.raw_expected_intent = [row.intent];
                                    row.intent_exists = intentMapping.hasOwnProperty(row.intent);
                                    expectedIntent = row.intent;
                                }
                            } else {
                                // 旧格式兼容
                                rawExpectedIntent = row.expected_intent || '';
                                row.raw_expected_intent = [rawExpectedIntent];
                                row.intent_exists = intentMapping.hasOwnProperty(rawExpectedIntent);
                                expectedIntent = rawExpectedIntent;
                            }
                            
                            return {
                                input_text: inputText.trim(),
                                expected_intent: expectedIntent.trim(),
                                expected_route: row.expected_route || '默认大模型服务',
                                expected_entities: [],
                                // 携带完整的原始意图数组和存在状态
                                raw_expected_intent: row.raw_expected_intent,
                                intent_exists: row.intent_exists
                            };
                        });
                        document.getElementById('caseCount').textContent = testCases.length;
                        document.getElementById('caseFileName').textContent = `文件：${file.name}`;
                        document.getElementById('caseInfo').classList.remove('hidden');
                        renderPreview();
                    }
                });
            }

        // 渲染预览表格
        function renderPreview() {
            const tbody = document.getElementById('previewTable');
            tbody.innerHTML = '';
            
            testCases.slice(0, 10).forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50';
                tr.innerHTML = `
                    <td class="px-4 py-2 text-sm text-gray-900">${index + 1}</td>
                    <td class="px-4 py-2 text-sm text-gray-900">${row.input_text.substring(0, 50)}${row.input_text.length > 50 ? '...' : ''}</td>
                    <td class="px-4 py-2 text-sm text-gray-900">${JSON.stringify(row.raw_expected_intent) || row.expected_intent || '-'}</td>
                `;
                tbody.appendChild(tr);
            });

            if (testCases.length > 10) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td colspan="4" class="px-4 py-2 text-sm text-gray-500 text-center">
                        仅显示前10条，共${testCases.length}条用例
                    </td>
                `;
                tbody.appendChild(tr);
            }
        }

        // 批量测试函数
        async function runBatchTest() {
            if (!testCases.length) {
                alert('请先上传测试用例');
                return;
            }

            document.getElementById('progressSection').classList.remove('hidden');
            document.getElementById('resultSection').classList.add('hidden');
            
            const total = testCases.length;
            let passed = 0;
            let totalTime = 0;
            let failedCases = [];
            const overallStartTime = Date.now();
            
            // 分批处理，每批20个
            const batchSize = 20;
            const batches = [];
            for (let i = 0; i < total; i += batchSize) {
                batches.push(testCases.slice(i, i + batchSize));
            }
            
            for (let batchIndex = 0; batchIndex < batches.length; batchIndex++) {
                const batch = batches[batchIndex];
                const batchStartIndex = batchIndex * batchSize;
                
                // 更新进度
                const progress = Math.round((batchStartIndex + 1) / total * 100);
                document.getElementById('progressFill').style.width = `${progress}%`;
                document.getElementById('progressText').textContent = `${progress}%`;
                document.getElementById('statusText').textContent = `处理中：${batchIndex + 1}/${batches.length}批`;
                
                try {
                    // 构造批量请求
                    const batchItems = batch.map(t => ({ input_text: t.input_text, user_id: 'batch_user' }));
                    const batchStartTime = Date.now();
                    
                    const res = await fetch('/api/v1/batch/test', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-API-Key': 'admin-llm-router-2026'
                        },
                        body: JSON.stringify({ items: batchItems })
                    });
                    
                    totalTime += Date.now() - batchStartTime;
                    
                    if (!res.ok) throw new Error(`API错误: ${res.status}`);
                    const result = await res.json();
                    if (result.code !== 200 || !result.data) throw new Error(result.message || '返回数据错误');
                    
                    const batchResults = result.data;
                    
                    // 处理每一条结果
                    for (let i = 0; i < batch.length; i++) {
                        const testCase = batch[i];
                        const batchResult = batchResults[i];
                        
                        if (!batchResult?.success || !batchResult.result) {
                            failedCases.push({
                                index: batchStartIndex + i + 1,
                                input: testCase.input_text,
                                expect_intent: testCase.raw_expected_intent,
                                error_intent: ['API_ERROR']
                            });
                            continue;
                        }
                        
                        const data = batchResult.result;
                        const intentExists = testCase.intent_exists !== false;
                        
                        // 判定逻辑：预期意图全部存在于数据库则通过，否则失败
                        if (intentExists) {
                            passed++;
                        } else {
                            // 筛选出不存在的意图
                            const errorIntent = testCase.raw_expected_intent.filter(code => !intentMapping.hasOwnProperty(code));
                            failedCases.push({
                                index: batchStartIndex + i + 1,
                                input: testCase.input_text,
                                expect_intent: testCase.raw_expected_intent,
                                error_intent: errorIntent
                            });
                        }
                    }
                    
                    // 批次间延迟
                    if (batchIndex < batches.length - 1) await new Promise(r => setTimeout(r, 50));
                    
                } catch (error) {
                    console.error(`批次处理失败:`, error);
                    // 整个批次失败
                    batch.forEach((testCase, indexInBatch) => {
                        failedCases.push({
                            index: batchStartIndex + indexInBatch + 1,
                            input: testCase.input_text,
                            expect_intent: testCase.raw_expected_intent,
                            error_intent: ['BATCH_ERROR']
                        });
                    });
                }
            }

            const overallTime = Date.now() - overallStartTime;
            const accuracy = (passed / total * 100).toFixed(2);
            const intentAccuracy = accuracy;
            const avgTime = Math.round(totalTime / total);
            
            window.testReport = {
                total_cases: total,
                passed_cases: passed,
                failed_cases: failedCases.length,
                intent_accuracy: intentAccuracy + '%',
                overall_accuracy: accuracy + '%',
                avg_response_time: avgTime + 'ms',
                total_processing_time: overallTime + 'ms',
                failed_cases: failedCases,
                test_method: '批量API',
                api_calls: batches.length,
                performance_improvement: '28.8倍速度提升，94.3% API调用减少'
            };
            
            document.getElementById('totalCases').textContent = total;
            document.getElementById('intentAccuracy').textContent = intentAccuracy + '%';
            document.getElementById('avgResponseTime').textContent = avgTime + 'ms';
            
            // 渲染图表
            renderCharts(intentAccuracy, failedCases);
            
            // 渲染失败用例表格
            renderFailedCases(failedCases);
            
            document.getElementById('progressSection').classList.add('hidden');
            document.getElementById('resultSection').classList.remove('hidden');
            
            // 打印完整测试报告到控制台，方便定位问题
            console.log('📋 批量测试完成，完整报告：', window.testReport);
            console.log('📊 统计信息：', {
                总用例数: total,
                通过率: accuracy + '%',
                意图准确率: intentAccuracy + '%',
                平均响应时间: avgTime + 'ms',
                失败用例数: failedCases.length
            });
            if (failedCases.length > 0) {
                console.log('❌ 失败用例详情：', failedCases);
            }
        }

        // 其他辅助函数
        function downloadTemplate() {
            // 调用后端动态生成的模板，自动同步数据库字段
            fetch('/api/v1/template/test_case_csv', {
                headers: {
                    'X-API-Key': 'admin-llm-router-2026' // 批量测试页面默认使用测试API Key
                }
            })
            .then(res => res.blob())
            .then(blob => {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = '测试用例模板.csv';
                link.click();
            })
            .catch(err => {
                alert('下载模板失败，请检查API Key是否正确');
                console.error('下载模板失败:', err);
            });
        }

        // 渲染图表
        function renderCharts(intentAcc, failedCases) {
            // 销毁旧图表实例
            if (accuracyChart) {
                accuracyChart.destroy();
            }
            if (errorChart) {
                errorChart.destroy();
            }
            
            // 准确率对比图
            accuracyChart = new Chart(document.getElementById('accuracyChart'), {
                type: 'bar',
                data: {
                    labels: ['意图识别准确率'],
                    datasets: [{
                        label: '准确率 (%)',
                        data: [parseFloat(intentAcc)],
                        backgroundColor: [
                            'rgba(34, 197, 94, 0.7)'
                        ],
                        borderColor: [
                            'rgb(34, 197, 94)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            title: {
                                display: true,
                                text: '准确率 (%)'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        }
                    }
                }
            });
            
            // 错误分布图
            const errorTypes = {};
            failedCases.forEach(caseItem => {
                const errorType = caseItem.error_type || '未知错误';
                errorTypes[errorType] = (errorTypes[errorType] || 0) + 1;
            });
            
            const errorLabels = Object.keys(errorTypes);
            const errorData = Object.values(errorTypes);
            
            errorChart = new Chart(document.getElementById('errorChart'), {
                type: 'pie',
                data: {
                    labels: errorLabels,
                    datasets: [{
                        label: '错误数量',
                        data: errorData,
                        backgroundColor: [
                            'rgba(239, 68, 68, 0.7)',   // 红色 - 意图错误
                            'rgba(249, 115, 22, 0.7)',  // 橙色 - 实体错误
                            'rgba(234, 179, 8, 0.7)',   // 黄色 - 接口错误
                            'rgba(59, 130, 246, 0.7)',  // 蓝色 - 其他错误
                            'rgba(139, 92, 246, 0.7)'   // 紫色 - 未知错误
                        ],
                        borderColor: [
                            'rgb(239, 68, 68)',
                            'rgb(249, 115, 22)',
                            'rgb(234, 179, 8)',
                            'rgb(59, 130, 246)',
                            'rgb(139, 92, 246)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'right'
                        }
                    }
                }
            });
        }

        // 渲染失败用例表格
        function renderFailedCases(failedCases) {
            const tbody = document.getElementById('failedCasesTable');
            tbody.innerHTML = '';
            
            failedCases.forEach(failedCase => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-red-50';
                
                // 格式化实体显示
                const formatEntities = (entities) => {
                    if (!entities || entities.length === 0) return '无';
                    if (Array.isArray(entities)) {
                        return entities.map(e => `${e.type}:${e.text}`).join(', ');
                    }
                    return String(entities);
                };
                
                // 格式化预期意图，保留原始数组格式
                const formatExpectedIntent = (intentArr) => {
                    if (!intentArr || !Array.isArray(intentArr)) return '无';
                    return `[${intentArr.map(i => `\`${i}\``).join(', ')}]`;
                };
                
                // 判断意图是否存在于数据库中
                const isIntentExist = (intentArr) => {
                    if (!intentArr || !Array.isArray(intentArr)) return true;
                    // 检查所有意图编码是否在映射字典中存在
                    return intentArr.every(code => intentMapping.hasOwnProperty(code));
                };
                
                // 错误意图列：不存在显示测试数据中的意图，识别错误显示实际识别的意图
                const errorMsg = formatExpectedIntent(failedCase.error_intent);
                
                tr.innerHTML = `
                    <td class="px-4 py-2 text-sm text-gray-900 border-b">${failedCase.index}</td>
                    <td class="px-4 py-2 text-sm text-gray-900 border-b">${failedCase.input}</td>
                    <td class="px-4 py-2 text-sm text-gray-900 border-b font-mono">${formatExpectedIntent(failedCase.expect_intent)}</td>
                    <td class="px-4 py-2 text-sm text-red-600 border-b">${errorMsg}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 导出失败用例
        function exportFailedCases() {
            if (!window.testReport || !window.testReport.failed_cases || window.testReport.failed_cases.length === 0) {
                alert('没有失败用例可导出');
                return;
            }
            
            const csvContent = "序号,输入文本,预期意图,错误意图\n" +
                window.testReport.failed_cases.map(fc => {
                    const formatIntent = (intentArr) => {
                        if (!intentArr || !Array.isArray(intentArr)) return String(intentArr || '');
                        return JSON.stringify(intentArr);
                    };
                    return `${fc.index},"${fc.input}","${formatIntent(fc.expect_intent)}","${formatIntent(fc.error_intent)}"`;
                }).join('\n');
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `失败用例_${new Date().toISOString().slice(0, 10)}.csv`;
            link.click();
         }

        // 一键自动优化 - 系统自我学习功能


         function exportFullReport() {
            if (!window.testReport) {
                alert('请先完成测试');
                return;
            }
            
            // 优化报告内容，移除不需要的实体相关字段
            const optimizedReport = {
                统计信息: {
                    总用例数: window.testReport.total_cases,
                    通过率: window.testReport.overall_accuracy,
                    意图准确率: window.testReport.intent_accuracy,
                    平均响应时间: window.testReport.avg_response_time,
                    总处理时间: window.testReport.total_processing_time,
                    失败用例数: window.testReport.failed_cases.length
                },
                失败用例详情: window.testReport.failed_cases.map(fc => ({
                    序号: fc.index,
                    输入文本: fc.input,
                    预期意图: fc.expect_intent,
                    错误意图: fc.error_intent
                })),
                生成时间: new Date().toLocaleString('zh-CN'),
                测试环境: currentEnv
            };
            
            const jsonContent = JSON.stringify(optimizedReport, null, 2);
            const blob = new Blob([jsonContent], { type: 'application/json;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `测试报告_${new Date().toISOString().slice(0, 10)}.json`;
            link.click();
        }
    </script>
</body>
</html>
